<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../../../dependencies/PageBuilder/css/loader.css">
  <style>
    body {
      padding: 1rem;
      font-family: 'Segoe UI', sans-serif;
    }
    .gallery {
      display: grid;
      gap: 0.85rem;
    }
    .gallery__row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      align-items: center;
      justify-content: center;
    }
    .gallery__label {
      margin: 0 0 0.35rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #1a2a6c;
      text-align: center;
    }
    .tile {
      min-width: 4.5rem;
      padding: 0.65rem 0.5rem;
      border-radius: 10px;
      text-align: center;
      font-weight: 600;
    }
    .box {
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .theme-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(5.5rem, 1fr));
      gap: 0.45rem;
    }
    .theme-strip .tile {
      padding: 0.55rem 0.35rem;
    }
  </style>
</head>
<body class="light-theme loading-fade-in">
  <div class="gallery">
    <section>
      <p class="gallery__label">Темы</p>
      <div class="theme-strip">
        <div class="tile light-theme border">light</div>
        <div class="tile dark-theme border">dark</div>
        <div class="tile dracula-theme border">dracula</div>
        <div class="tile nord-theme border">nord</div>
      </div>
    </section>

    <section>
      <p class="gallery__label">Цвета</p>
      <div class="gallery__row">
        <span class="box bg-blue text-white">blue</span>
        <span class="box bg-teal text-white">teal</span>
        <span class="box bg-indianred text-white">red</span>
        <span class="box bg-rainbow text-white">rain</span>
      </div>
    </section>

    <section>
      <p class="gallery__label">Custom + hover</p>
      <div class="gallery__row">
        <button class="custom hover-pulse-animation">Кнопка</button>
        <span class="custom size-80px center bg-blue text-white hover-scale-big-animation">80</span>
      </div>
    </section>

    <section>
      <p class="gallery__label">Анимации</p>
      <div class="gallery__row">
        <span class="box pulse bg-blue text-white">pulse</span>
        <span class="box rotate-clockwise bg-teal text-white">↻</span>
        <span class="tile custom hover-shadow-animation">hover</span>
      </div>
    </section>
  </div>
  <script src="../../../../js/article-content.js" defer></script>
</body>
</html>
