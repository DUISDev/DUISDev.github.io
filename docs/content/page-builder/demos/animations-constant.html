<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../../../dependencies/PageBuilder/css/loader.css">
  <style>
    body { padding: 1rem; font-family: 'Segoe UI', sans-serif; text-align: center; }
    .row { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; align-items: center; margin-bottom: 0.75rem; }
    .box { width: 4.5rem; height: 4.5rem; border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; }
  </style>
</head>
<body class="light-theme">
  <p class="rainbow-text" style="font-size:1.2rem;font-weight:800;margin:0 0 1rem;">rainbow-text</p>
  <div class="row">
    <span class="box pulse bg-blue text-white">pulse</span>
    <span class="box bg-rainbow text-white">bg-rainbow</span>
    <span class="box rotate-clockwise bg-teal text-white">↻</span>
    <span class="box infinity-shake bg-indianred text-white">shake</span>
  </div>
  <script src="../../../../js/article-content.js" defer></script>
</body>
</html>
