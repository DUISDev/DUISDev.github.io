<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../../../dependencies/PageBuilder/css/loader.css">
  <style>
    body { padding: 1rem; font-family: 'Segoe UI', sans-serif; }
    .demo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(6.5rem, 1fr)); gap: 0.65rem; }
    .tile { padding: 0.85rem 0.4rem; border-radius: 10px; text-align: center; font-weight: 700; cursor: pointer; background: rgba(30, 107, 255, 0.1); border: 2px solid rgba(30, 107, 255, 0.25); }
  </style>
</head>
<body class="light-theme">
  <div class="demo-grid">
    <div class="tile custom hover-pulse-animation">pulse</div>
    <div class="tile custom hover-scale-big-animation">scale</div>
    <div class="tile custom hover-shadow-animation">shadow</div>
    <div class="tile custom hover-rotate-animation">rotate</div>
    <div class="tile custom hover-blur-3">blur</div>
    <div class="tile custom hover-rgb-glitch">glitch</div>
  </div>
  <script src="../../../../js/article-content.js" defer></script>
</body>
</html>
