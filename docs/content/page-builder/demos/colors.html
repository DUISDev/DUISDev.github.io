<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../../../dependencies/PageBuilder/css/loader.css">
  <style>
    body { padding: 1rem; font-family: 'Segoe UI', sans-serif; }
    .row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; }
    .swatch { min-width: 5rem; padding: 0.65rem; border-radius: 8px; text-align: center; font-size: 0.75rem; font-weight: 700; }
  </style>
</head>
<body class="light-theme">
  <p class="text-blue bg-white" style="padding:0.5rem;margin-bottom:0.5rem;">text-blue + bg-white</p>
  <div class="row">
    <span class="swatch bg-red text-white">bg-red</span>
    <span class="swatch bg-blue text-white">bg-blue</span>
    <span class="swatch bg-green text-white">bg-green</span>
    <span class="swatch bg-teal text-white">bg-teal</span>
    <span class="swatch bg-purple text-white">bg-purple</span>
    <span class="swatch bg-orange text-black">bg-orange</span>
  </div>
  <div class="row">
    <span class="swatch bg-rainbow text-white">bg-rainbow</span>
    <span class="swatch bg-opacity bg-blue text-white">bg-opacity</span>
    <span class="swatch pulse bg-red-white">pulse</span>
  </div>
  <script src="../../../../js/article-content.js" defer></script>
</body>
</html>
