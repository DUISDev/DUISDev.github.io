<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Темы Page Builder</title>
  <link rel="stylesheet" href="../../../../dependencies/PageBuilder/css/loader.css">
  <style>
    body { padding: 1rem; font-family: 'Segoe UI', sans-serif; }
    .demo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(8rem, 1fr)); gap: 0.65rem; }
    .demo-tile { padding: 1rem 0.5rem; border-radius: 10px; text-align: center; font-size: 0.82rem; font-weight: 600; }
  </style>
</head>
<body class="light-theme">
  <div class="demo-grid">
    <div class="demo-tile light-theme">light-theme</div>
    <div class="demo-tile dark-theme">dark-theme</div>
    <div class="demo-tile vs-code-dark-theme">vs-code-dark</div>
    <div class="demo-tile dracula-theme">dracula</div>
    <div class="demo-tile nord-theme">nord</div>
    <div class="demo-tile github-dark-theme">github-dark</div>
    <div class="demo-tile monokai-theme">monokai</div>
    <div class="demo-tile gruvbox-dark-theme">gruvbox-dark</div>
    <div class="demo-tile oceanic-next-theme">oceanic</div>
    <div class="demo-tile mint-theme">mint</div>
    <div class="demo-tile coral-theme">coral</div>
    <div class="demo-tile midnight-theme">midnight</div>
  </div>
  <script src="../../../../js/article-content.js" defer></script>
</body>
</html>
