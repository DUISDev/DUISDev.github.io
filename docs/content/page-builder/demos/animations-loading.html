<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../../../dependencies/PageBuilder/css/loader.css">
  <style>
    body { padding: 1rem; font-family: 'Segoe UI', sans-serif; }
    .demo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(7rem, 1fr)); gap: 0.65rem; }
    .tile { padding: 0.85rem 0.5rem; border-radius: 10px; text-align: center; font-weight: 600; background: rgba(30, 107, 255, 0.12); }
  </style>
</head>
<body class="light-theme">
  <div class="demo-grid">
    <div class="tile loading-fade-in">fade-in</div>
    <div class="tile loading-fade-in-up">fade-in-up</div>
    <div class="tile loading-fade-in-left">fade-in-left</div>
    <div class="tile loading-slide-up">slide-up</div>
    <div class="tile loading-zoom">zoom</div>
    <div class="tile loading-scale-in">scale-in</div>
  </div>
  <script src="../../../../js/article-content.js" defer></script>
</body>
</html>
